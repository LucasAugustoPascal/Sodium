name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sodium-launcher/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: sodium-launcher
        run: npm ci

      - name: Build Frontend
        working-directory: sodium-launcher
        run: npm run build

      - name: Create Tauri Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: sodium-launcher
          tagName: ${{ github.ref_name }}
          releaseName: Sodium Launcher ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false