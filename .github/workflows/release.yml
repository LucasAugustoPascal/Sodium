name: Release

on:
  push:
    branches:
      - master

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sodium-launcher/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: sodium-launcher
        run: npm ci

      - name: Debug sodium-launcher/package.json
        working-directory: sodium-launcher
        run: |
          echo "Current directory:"
          pwd
          echo "Available scripts:"
          npm run

      - name: Build Frontend
        working-directory: sodium-launcher
        run: npm run build

      - name: Build Tauri
        working-directory: sodium-launcher
        run: npm run tauri build -- --no-before-build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.platform }}
          path: sodium-launcher/src-tauri/target/release/bundle/**
